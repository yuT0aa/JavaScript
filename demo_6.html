<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script type="text/javascript">
        document.querySelector("#btnCal").addEventListener("click",function(){
            let poids=document.querySelector("#poids").value;
            let taille=parseFloat(document.querySelector("#taille").value);
            let imc=poids/(taille**2);
            document.querySelector("#resultat").innerHTML=`Votre IMC est : ${imc.toFixed(2)}`;
            
        });
    </script>
</head>
<body>
    <div class="container mt-3 p-3">
        <form action="" class="w-50 mx-auto">
            <div class="mb-3">
                <label for="poids" class="form-label">Poids (kg)</label>
                <input type="number" id="poids" class="form-control">
            </div>
            <div class="mb-3">
                <label for="taille" class="form-label">Taille (m)</label>
                <input type="number" id="taille" class="form-control">
            </div>
            <div>
                <button type="button" id="btnCal" class="btn btn-primary">Calculer</button>
            </div>
              <div id="resultat"></div>
            </div>
        </form>
    </div>
</body>
</html>
