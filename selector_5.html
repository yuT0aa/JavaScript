<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div style="margin: 12px 5px;">
            <label for="pu">Prix unitaire</label>
            <input type="number" id="pu">
        </div>
        <div style="margin: 12px 5px;">
            <label for="q">Quantité</label>
            <input type="number" id="q">
        </div>
        <div style="margin: 12px 5px;">
            <button type="button" id="c">Calculer</button>
        </div>
    </form>
    <p id="res"></p>
    <script type="text/javascript">
        document.querySelector("#c").addEventListener('click',function(){
            let pu=parseFloat(document.querySelector('#pu').value);
            let q=parseFloat(document.querySelector('#q').value);
            let res=pu*q;
            let p=document.querySelector('#res');
            p.innerHTML=`Résultat : ${res}`;
            if(res>1000){
                p.style.color='red';
                p.style.fontWeight='bold';
            }else{
                p.style.color='black';
                p.style.fontWeight='normal';
            }
        });
    </script>
</body>
</html>
