<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
     <div class="container my-5 p-5">
        <form action="" class="w-50 p-5 mx-auto rounded-2 bg-light">
             <h2>Calculer son IMC</h2>
            <div class="my-3 form-check form-check-inline">
                <input type="radio" checked class="form-check-input" name="genre" id="homme">
                <label for="homme" class="form-check-label">Homme</label>
            </div>
            <div class="my-3 form-check form-check-inline">
                <input type="radio" class="form-check-input" name="genre" id="femme">
                <label for="femme" class="form-check-label">Femme</label>
            </div>
            <div class="mb-3">
                <input type="number" class="form-control" step="0.01" min="25" max="120" id="poids" placeholder="saisir votre poids...">
            </div>
        <div class="mb-3">
                <input type="number" class="form-control" step="0.01" min="1.00" max="2.00" id="taille" placeholder="saisir votre taille...">
        </div>
        <div class="mb-3">
            <button type="button" class="btn btn-primary w-100" id="bc">Caluler IMC</button>

        </div>
        <div class="mb-3" id="res"></div>
        </form>
     </div> 
 




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>

<script src="./scriptFile.js" type="text/javascript"></script>


</body>
</html>
