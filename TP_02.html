<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <header>
        <h1>Calcul du prix TVA</h1>
    </header>
    <div class="container mt-3 p-3">
        <form action="" class="w-50 mx-auto">
            <div class="mb-3">
                <label for="PHT" class="form-label">PHT</label>
                <input type="number" id="PHT" class="form-control">
            </div>
            <div>
                <button type="button" id="btnCal" class="btn btn-primary">Calculer</button>
            </div>
              <div id="resultat"></div>
            </div>
         </form>
     </div>

    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script type="text/javascript">
    document.querySelector('#btnCal').addEventListener('click',function(){
         let PHT=parseFloat(document.querySelector('#PHT').value);
         let TTC=PHT+PHT*0.2;
       document.querySelector('#resultat').textContent=`Prix TTC: ${TTC.toFixed(2)}$`;

    });

</script>
</body>
</html>
