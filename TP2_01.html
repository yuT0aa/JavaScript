<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div style="margin: 12px 5px;">
            <label for="n1">Age</label>
            <input type="number" id="n1">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n2">Taille (m)</label>
            <input type="number" id="n2">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n3">Poids (kg)</label>
            <input type="number" id="n3">
        </div>
        <div style="margin: 12px 5px;">
            <button type="button" id="c">Calculer</button>
        </div>
    </form>
    <p id="res"></p>
    <script type="text/javascript">
        document.querySelector("#c").addEventListener('click',function(){
            let n1=parseFloat(document.querySelector('#n3').value);
            let n2=parseFloat(document.querySelector('#n2').value);
            let res=n3/(n2*n2);
            document.querySelector('#res').innerHTML=res;
        });
    </script>

</body>
</html>
