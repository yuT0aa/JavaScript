<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

</head>
<body>
<div class="container mt-4">
        <h1>Soumission de Candidature</h1>
        <form action="" class="w-50 mx-auto">
            <div class="mb-3">
                <label for="nomComlet">Nom Complet</label>
                <input type="text" class="form-control" id="nomComlet" required>
            </div>
            <div class="mb-3">
                <label for="ville">Ville</label>
                <input type="text" class="form-control" id="ville" required>
            </div>
            <div class="mb-3">
                <label for="competences">Competences</label>
                <input type="text" class="form-control" id="competences" required>
            </div>
            <div class="mb-3">
                <label for="dispo">Disponibilité</label>
                <input type="text" class="form-control" id="dispo" required>
            </div>
            <div class="mb-3">
                <label for="typeMission">Type de mission souhaitée</label>
                <input type="text" class="form-control" id="typeMission" required>
            </div>
            <div class="mb-4">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="pass">Mot de passe</label>
                <input type="password" class="form-control" id="pass" required>
            </div>
            <button type="submit" class="btn btn-primary col-12">Soumettre</button>
        </form>
    <div class="container mt-4">
        <h2 class="text-center">Tableau des candidatures</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nom Complet</th>
                    <th>Ville</th>
                    <th>Competences</th>
                    <th>Disponibilité</th>
                    <th>Type de mission souhaitée</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableCandidates">
            </tbody>
        </table>
    </div>
</div>
    <script type="text/javascript">
        let candidates=[];
        document.querySelector('#form').addEventListener('click',function(e){
            e.preventDefault();
            calculate();
        });
        const addCandidateToTable=(candidate)=>{
            const tableBody=$('#tableCandidates');
            const row=$('<tr>');
                row.html(`
                    <td>${candidate.nom}</td>
                    <td>${candidate.ville}</td>
                    <td>${candidate.competences}</td>
                    <td>${candidate.dispo}</td>
                    <td>${candidate.typeMission}</td>
                    <td>${candidate.email}</td>
                    <td>${candidate.pass}</td>
                    <td><button class="btn btn-danger">Supprimer</button></td>
                `);
            tableBody.append(row);
        }
        const deleteCandidate=(button)=>{
            const row=$(button).closest('tr');
            const index=row.index();
            if(confirm('supprimer candidature ?')){
                candidates.splice(index,1);
                row.remove();
            }
        }
    </script>
</body>
</html>
