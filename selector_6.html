<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div style="margin: 12px 5px;">
            <label for="n1">Nombre 1</label>
            <input type="number" id="n1">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n2">Nombre 2</label>
            <input type="number" id="n2">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n3">Nombre 3</label>
            <input type="number" id="n3">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n4">Nombre 4</label>
            <input type="number" id="n4">
        </div>
        <div style="margin: 12px 5px;">
            <label for="n5">Nombre 5</label>
            <input type="number" id="n5">
        </div>
        <div style="margin: 12px 5px;">
            <button type="button" id="c">Calculer la somme</button>
        </div>
    </form>
    <p id="res"></p>
    <script type="text/javascript">
        document.querySelector("#c").addEventListener('click',function(){
            let inputs=document.querySelectorAll('input[type=number]');
            let sum=0;
            inputs.forEach(function(elt,pos){
                sum+=parseFloat(elt.value);
            });
            let p=document.querySelector('#res');
            p.innerHTML=`La somme totale : ${sum}`;
        });
    </script>
</body>
</html>
