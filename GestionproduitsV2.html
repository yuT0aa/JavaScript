<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container p-3 my-4">
     <h2>Gestion de produits</h2>
     <form action="" name="formProduct">
        <div class="row">

       <div class="col"><input type="text" class="form-control" name="nom" id="nom"></div>
       <div class="col"><input type="number" class="form-control" name="prix" id="prix"></div>
       <div class="col"><button type="button" class="btn btn-sm btn-success" id="btnAdd">Ajouter</button></div>
       
       
        </div>
        </form>
        <table class="table table-striped" id="tbl_products">
            <thead>
                <tr><th>Nom</th><th>Prix</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script type="text/javascript">
      //définir le tableau javascript listProduit
             let listProduit=[];
             //fonction display
             /*const display=()=>{
                 document.querySelector('#tbl_products tbody').innerHTML='';
                 listProduit.forEach((item,pos)=>{
                   let newRow=`<tr><td>${item.nom}</td><td>${item.prix}</td>
                      <td><button type="button" class="btn btn-sm btn-danger">Del</button></td>
                    `;
                    document.querySelector('#tbl_products tbody').insertAdjacentHTML('beforeend',newRow);
                 });
             }*/
         const display=()=>{
         if(localStorage.getItem('produits')!=null){
            listProduit=JSON.parse(localStorage.getItem('produits'));
         }
         document.querySelector('#tbl_products tbody').innerHTML='';
         document.querySelector('#tbl_products tbody').innerHTML=listProduit.map((item,pos)=>`<tr><td>${item.nom}</td><td>${item.prix}</td>
                      <td><button type="button" class="btn btn-sm btn-danger" onclick="deleteP(${pos})">Del</button></td>
                    `).join('');
             }
    document.querySelector('#btnAdd').onclick=()=>{
   let nom=document.querySelector('#nom').value;
    let prix=document.querySelector('#prix').value;
    console.log(nom+'-'+prix);
    if(nom.trim()===''||parseInt(prix)<0){
        alert('vous devez remplir les champs !! ');
        return;
        }
    listProduit.push({nom,prix})//{nom:nom,prix:prix}
    localStorage.setItem('produits',JSON.stringify(listProduit))
    alert('Bien ajouté  !! ');
    document.querySelector('#nom').value='';
    document.querySelector('#prix').value='';
    console.log(listProduit);
    display();
             }
    const deleteP=(pos)=>{
        console.log(pos);
        listProduit.splice(pos,1);
 localStorage.setItem('produits',JSON.stringify(listProduit))
        display();
}
</script>
</body>
</html>
