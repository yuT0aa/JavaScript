<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="d-flex justify-content-center">
    <form action="" class="container mt-5 col-6 d-flex flex-column justify-content-center ">
        <h2>Formulaire d'inscription</h2>

        <label for="nom">Nom:</label>
        <input type="text" id="nom" name="nom"><br>

        <label for="prenom">Prenom:</label>
        <input type="text" name="prenom" id="prenom"><br>

        <label for="age">Age:</label>
        <input type="number" name="age" id="age"><br>
        
        <label for="sexe">Sexe:</label>
            <input type="radio" name="sexe" id="F">
            <label for="F">Feminin</label>
            <input type="radio" name="sexe" id="M">
            <label for="M">Masculin</label><br>

        <label for="pays">Pays:</label>
        <select name="pays" id="pays">
            <option value="belgique">Belgique</option>
            <option value="france">France</option>
            <option value="espagne">Espagne</option>
        </select><br>

        <label for="discipline">Discipline:</label>
            <input type="checkbox" name="discipline" id="Mara">
            <label for="Mara">Mararhon</label>    
            <input type="checkbox" name="discipline" id="Nat">
            <label for="Nat">Natation</label> 
            <input type="checkbox" name="discipline" id="Spr">
            <label for="Spr">Sprint</label>
            <input type="checkbox" name="discipline" id="Sau">
            <label for="Sau">Saut</label><br>

        <button type="button btn-btn-primary">Enregistrer</button>
    </form> 
    <h2>Listes des inscriptions</h2>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>nom</th>
                    <th>prenom</th>
                    <th>age</th>
                    <th>Sexe</th>
                    <th>pay</th>
                    <th>Disciplines</th>
                    <th>actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    <script src="script.js"></script>
</body>
</html>
