<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <header>Calcul IMC</header>
    <div class="container mt-3 p-3">
    <form action="" class="w-50 mx-auto">
     <div class="mb-3"> 
        <input type="text" id="poids" class="form-control">
    </div>
    <div class="mb-3"> 
        <input type="text" id="taille" class="form-control">
    </div>
<div class="mb-3">
    <button id="btnCal" type="button" class="btn  btn-outline-primary">Calculer</button>
  <div id="resultat"></div>

</div>
    </form>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>


<script type="text/javascript">
    document.querySelector('#btnCal').addEventListener('click',function(){
         let poids=parseFloat(document.querySelector('#poids').value);
         let taille=parseFloat(document.querySelector('#taille').value);
         let IMC=poids/taille**2;
       document.querySelector('#resultat').textContent=`IMC:${IMC.toFixed(2)}`;

    });

</script>   
</body>
</html>
