<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits électroniques</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

  <h2 class="mb-4">Liste des Produits</h2>

  <!-- Filtre catégorie -->
  <select id="filtreCategorie" class="form-select mb-3">
    <option value="all">Toutes les catégories</option>
    <option value="smartphone">Smartphone</option>
    <option value="ordinateur">Ordinateur</option>
    <option value="tablette">Tablette</option>
  </select>

  <!-- Recherche -->
  <input type="text" id="rechercheNom" class="form-control mb-4" placeholder="Rechercher un produit">

  <!-- Affichage des produits -->
  <div class="row" id="listeProduits"></div>

  <script type="text/javascript">
    const produits = [
      { id: 1, nom: "iPhone 13", categorie: "smartphone", prix: 900, marque: "Apple" },
      { id: 2, nom: "Samsung S21", categorie: "smartphone", prix: 800, marque: "Samsung" },
      { id: 3, nom: "MacBook", categorie: "ordinateur", prix: 2000, marque: "Apple" },
      { id: 4, nom: "HP Pavilion", categorie: "ordinateur", prix: 1000, marque: "HP" },
      { id: 5, nom: "iPad", categorie: "tablette", prix: 600, marque: "Apple" }
    ];

    const listeProduits = document.getElementById("listeProduits");
    const filtreCategorie = document.getElementById("filtreCategorie");
    const rechercheNom = document.getElementById("rechercheNom");

    function afficherProduits() {
      const categorie = filtreCategorie.value;
      const recherche = rechercheNom.value.toLowerCase();

      const produitsFiltres = produits.filter(produit => {
        return (
          (categorie === "all" || produit.categorie === categorie) &&
          produit.nom.toLowerCase().includes(recherche)
        );
      });

      listeProduits.innerHTML = "";

      produitsFiltres.forEach(produit => {
        listeProduits.innerHTML += `
          <div class="col-md-4 mb-3">
            <div class="card p-3">
              <h5>${produit.nom}</h5>
              <p>Catégorie : ${produit.categorie}</p>
              <p>Prix : ${produit.prix} DH</p>
              <button class="btn btn-primary" onclick="voirDetails(${produit.id})">
                Voir détails
              </button>
            </div>
          </div>
        `;
      });
    }

    function voirDetails(id) {
      const produit = produits.find(p => p.id === id);
      alert(
        "Nom : " + produit.nom + "\n" +
        "Catégorie : " + produit.categorie + "\n" +
        "Prix : " + produit.prix + " DH\n" +
        "Marque : " + produit.marque
      );DH
    }

    filtreCategorie.addEventListener("change", afficherProduits);
    rechercheNom.addEventListener("input", afficherProduits);

    afficherProduits();
  </script>

</body>
</html>
