<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul Total Formations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

  <h2 class="mb-4">Choisir des Formations</h2>

  <div class="form-check">
    <input class="form-check-input formation" type="checkbox" value="500" id="html">
    <label class="form-check-label" for="html">HTML - 500 DH</label>
  </div>

  <div class="form-check">
    <input class="form-check-input formation" type="checkbox" value="700" id="css">
    <label class="form-check-label" for="css">CSS - 700 DH</label>
  </div>

  <div class="form-check">
    <input class="form-check-input formation" type="checkbox" value="1000" id="js">
    <label class="form-check-label" for="js">JavaScript - 1000 DH</label>
  </div>

  <button class="btn btn-success mt-3" onclick="calculerTotal()">
    Calculer Total
  </button>

  <h4 class="mt-3" id="resultat">Total : 0 DH</h4>

  <script>
    function calculerTotal() {
      const formations = document.querySelectorAll(".formation");
      let total = 0;

      formations.forEach(formation => {
        if (formation.checked) {
          total += parseInt(formation.value);
        }
      });

      document.getElementById("resultat").innerText = "Total : " + total + " DH";
    }
  </script>

</body>
</html>
